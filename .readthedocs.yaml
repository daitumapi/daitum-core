version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt

    # Install local packages so autodoc can import them
    - method: pip
      path: daitum-model
    - method: pip
      path: daitum-ui
    - method: pip
      path: daitum-configuration